name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - run: uv venv
      - run: uv pip install ruff
      - run: uv run ruff check .

  type-check:
    name: Type Check
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - run: uv venv
      - run: uv pip install -e .
      - run: uv pip install pyright
      - run: uv run pyright src/

  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - run: uv venv
      - run: uv pip install -e .
      - run: uv pip install pytest pytest-cov
      - run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml -v
