name: AI Code Review
on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
  repository-projects: read
concurrency:
  group: ocr-review-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ocr-review:
    name: OpenCodeReview
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        vars.ENABLE_AI_CODE_REVIEW == 'true' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    timeout-minutes: 30
    env:
      HOME: /Users/jonathangadeaharder
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve previous review comments
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Resolve (minimize) all previous review comments authored by this
          # bot before posting fresh ones. Prevents the gate from accumulating
          # stale findings across runs — only the current run's comments
          # remain active.
          set +e
          COMMENTS_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]") | .id' 2>/dev/null)
          if [ -z "$COMMENTS_JSON" ]; then
            echo "No previous comments to resolve."
            exit 0
          fi
          for id in $COMMENTS_JSON; do
            gh api "repos/${REPO}/pulls/comments/${id}/replies" \
              --method POST \
              -f body="Resolved — superseded by a newer review run." \
              > /dev/null 2>&1 || true
            # Minimize (mark resolved) via the GraphQL API.
            gh api graphql -f query="
              mutation {
                minimizeComment(input: {subjectId: \"${id}\"}) {
                  minimizedComment { isMinimized minimizedReason }
                }
              }" > /dev/null 2>&1 || true
          done
          echo "Resolved $(echo "$COMMENTS_JSON" | wc -l | tr -d ' ') previous comment(s)."
      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF"
      - name: Run OpenCodeReview
        id: ocr
        shell: bash {0}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set +e
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
          export HOME=/Users/jonathangadeaharder
          WORK_DIR="${{ github.workspace }}"
          ${OCR_BIN_PATH:-/usr/local/bin/ocr} review --from "origin/$BASE_REF" --to HEAD --format json --audience agent --repo "$PWD" > "$WORK_DIR/ocr-output.json" 2>"$WORK_DIR/ocr-stderr.log"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::OpenCodeReview failed with exit code $EXIT_CODE"
            echo "=== STDERR ==="
            cat "$WORK_DIR/ocr-stderr.log"
            echo "=== STDOUT ==="
            cat "$WORK_DIR/ocr-output.json"
            exit 1
          fi
          COMMENTS=$(jq '.summary.comments // 0' "$WORK_DIR/ocr-output.json" 2>/dev/null)
          if [ -z "$COMMENTS" ] || [ "$COMMENTS" = "null" ]; then
            echo "::error::OpenCodeReview produced invalid JSON output"
            echo "=== STDOUT ==="
            cat "$WORK_DIR/ocr-output.json"
            echo "=== STDERR ==="
            cat "$WORK_DIR/ocr-stderr.log"
            exit 1
          fi
          echo "comments=$COMMENTS" >> "$GITHUB_OUTPUT"
          echo "OCR found $COMMENTS comment(s) in this run"
      - name: Post review comments
        if: steps.ocr.outputs.comments != '0' && steps.ocr.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEW_COMMENT_COUNT: ${{ steps.ocr.outputs.comments }}
        shell: bash
        run: |
          WORK_DIR="${{ github.workspace }}"
          COMMENTS_FILE="$WORK_DIR/ocr-output.json"
          SUMMARY=$(jq -r '.comments[] | "**\(.path):\(.start_line)-\(.end_line)**\n\(.content)\n"' "$COMMENTS_FILE")
          BODY=$(printf '## OpenCodeReview found %s issue(s)\n\n%s' "$REVIEW_COMMENT_COUNT" "$SUMMARY")
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          exit 0
      - name: Gate
        if: steps.ocr.outputs.comments != '0' && steps.ocr.outputs.exit_code == '0'
        run: |
          echo "::error::OpenCodeReview found ${{ steps.ocr.outputs.comments }} issue(s) in this run. See review comments."
          exit 1
